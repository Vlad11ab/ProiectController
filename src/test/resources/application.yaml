spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        globally_quoted_identifiers: true

application:
  jwt:
    tokenPrefix: "Bearer"
    tokenExpirationAfterDays: 7
    secretKey: testSecretKeyForTestingPurposesOnly1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ
